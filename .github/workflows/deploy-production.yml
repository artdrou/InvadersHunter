name: Deploy production (backend)

# prod = production. Promotion is a PR from main into prod; merging pushes to prod and
# fires this deploy. The GitHub `production` environment should have a required reviewer,
# so the deploy pauses for manual approval before it touches production (Neon `production`
# branch — the real user data).
#
# Auth: RAILWAY_TOKEN_PROD = Railway project token scoped to the `production` environment.
on:
  push:
    branches: [prod]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-production.yml'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Railway up (production)
    runs-on: ubuntu-latest
    # The `invader-hunter-production` environment has a required reviewer (repo Settings →
    # Environments), so this deploy pauses for manual approval before touching prod.
    environment: invader-hunter-production
    steps:
      - uses: actions/checkout@v4

      - name: Guard on token
        id: guard
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PROD }}
        run: |
          if [ -z "${RAILWAY_TOKEN}" ]; then
            echo "::warning::RAILWAY_TOKEN_PROD not set — skipping deploy."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.guard.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Railway CLI
        if: steps.guard.outputs.skip == 'false'
        run: npm i -g @railway/cli

      - name: Deploy
        if: steps.guard.outputs.skip == 'false'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PROD }}
        run: railway up --service invader-hunter --ci
