name: OTA Update

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Canal de déploiement'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
      environment:
        description: 'Environnement EAS'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
          - development
      message:
        description: 'Message de mise à jour'
        required: true
        default: 'OTA update'

jobs:
  update:
    name: EAS Update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_ACCESS_TOKEN_GITHUB }}

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: EAS Update
        working-directory: frontend
        run: eas update --platform android --channel ${{ inputs.channel }} --environment ${{ inputs.environment }} --message "${{ inputs.message }}" --non-interactive
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_PROTOMAPS_KEY: ${{ secrets.EXPO_PUBLIC_PROTOMAPS_KEY }}
          EXPO_PUBLIC_ORS_KEY: ${{ secrets.EXPO_PUBLIC_ORS_KEY }}
