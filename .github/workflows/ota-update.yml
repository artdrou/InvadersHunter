name: OTA Update

# Push a JS-only (over-the-air) update to one of the three app builds.
#
# Pick the target with the "target" dropdown when running manually — it is the
# EAS build profile / channel / environment name all at once (they're kept in
# lock-step in eas.json):
#   development -> dev app     (…app.dev,  dev backend)
#   preview     -> staging app (…app.stag, staging backend)
#   production  -> prod app    (prod backend)
#
# The backend URL is read back out of eas.json for the chosen target, so an OTA
# always hits the same API as that target's binary build (fixes the old bug
# where every OTA shipped the same URL regardless of channel).
#
# A push to main auto-ships an OTA to the staging (preview) app.
on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:
    inputs:
      target:
        description: 'App cible (build EAS)'
        required: true
        default: 'preview'
        type: choice
        options:
          - development  # app dev     -> dev backend
          - preview      # app staging -> staging backend
          - production   # app prod    -> prod backend
      message:
        description: 'Message de mise à jour'
        required: true
        default: 'OTA update'

jobs:
  update:
    name: EAS Update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_ACCESS_TOKEN_GITHUB }}

      - name: Install dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: EAS Update
        working-directory: frontend
        env:
          # Empty on push events -> default to the staging (preview) app.
          TARGET: ${{ inputs.target || 'preview' }}
          MESSAGE: ${{ inputs.message || github.event.head_commit.message }}
          EXPO_PUBLIC_PROTOMAPS_KEY: ${{ secrets.EXPO_PUBLIC_PROTOMAPS_KEY }}
          EXPO_PUBLIC_ORS_KEY: ${{ secrets.EXPO_PUBLIC_ORS_KEY }}
        run: |
          set -euo pipefail
          # eas.json owns each build's backend URL; mirror it here so the OTA
          # bundle inlines the same EXPO_PUBLIC_API_URL as the target's binary.
          API_URL=$(jq -r ".build.\"$TARGET\".env.EXPO_PUBLIC_API_URL // empty" eas.json)
          if [ -z "$API_URL" ]; then
            echo "::error::No EXPO_PUBLIC_API_URL for target '$TARGET' in eas.json"
            exit 1
          fi
          echo "OTA -> target=$TARGET  channel=$TARGET  api=$API_URL"
          EXPO_PUBLIC_API_URL="$API_URL" \
          eas update --platform android \
            --channel "$TARGET" \
            --environment "$TARGET" \
            --message "$MESSAGE" \
            --non-interactive
