name: CI

# Full test suite. Runs on every PR into the two protected branches (main = staging,
# prod = production) and on direct pushes to them so branch-protection required checks
# always have a fresh result. Feature branches ("dev") are exercised via their PRs.
on:
  pull_request:
    branches: [main, prod]
  push:
    branches: [main, prod]

# A newer commit on the same PR/branch cancels the in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # matches backend/Dockerfile
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        # The suite swaps Postgres for in-memory SQLite (tests/conftest.py), so no DB
        # service is needed. "network" tests hit real HTTP and are excluded in CI.
        run: pytest -m "not network" -q

  frontend-tests:
    name: Frontend tests (jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm test -- --ci

  # NOTE: lint + typecheck are intentionally NOT gated yet.
  #  - `expo lint` needs `eslint` + `eslint-config-expo` added to devDependencies.
  #  - `tsc --noEmit` currently fails only because the committed
  #    frontend/.expo/types/router.d.ts is stale (Expo typed-routes are regenerated
  #    by `expo start`/`expo export`, not by tsc). Wire both up once those are sorted
  #    — see .github/DEPLOYMENT.md.
