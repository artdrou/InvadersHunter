name: Deploy staging (backend)

# main = staging. Every backend change merged to main redeploys the staging Railway
# environment (Neon `staging` branch).
#
# Auth: env-scoped Railway project token. RAILWAY_TOKEN_STAGING must be a token scoped
# to the `staging` environment, so `railway up` targets it without --environment.
# If Railway's native GitHub auto-deploy is enabled for this env, disable it (avoid double deploys).
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-staging.yml'
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Railway up (staging)
    runs-on: ubuntu-latest
    environment: invader-hunter-staging
    steps:
      - uses: actions/checkout@v4

      - name: Guard on token
        id: guard
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
        run: |
          if [ -z "${RAILWAY_TOKEN}" ]; then
            echo "::warning::RAILWAY_TOKEN_STAGING not set — skipping deploy."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.guard.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Railway CLI
        if: steps.guard.outputs.skip == 'false'
        run: npm i -g @railway/cli

      - name: Deploy
        if: steps.guard.outputs.skip == 'false'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
        run: railway up --service invader-hunter --ci
